{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-12 col-sm-8 col-md-5">
    <div class="text-center mb-4">
      <i class="bi bi-heart-pulse-fill" style="font-size:3rem;color:#6f42c1"></i>
      <h4 class="mt-2 fw-bold">{{ CONSULTORIO_NOMBRE }}</h4>
      <p class="text-muted small">{{ CONSULTORIO_ESPECIALIDAD }}</p>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h5 class="card-title mb-4">Iniciar sesión</h5>
        <form method="post">
          {% csrf_token %}
          {% if form.errors %}
          <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label" for="id_username">Usuario</label>
            <input type="text" name="username" id="id_username"
              class="form-control btn-touch" autocomplete="username" autofocus required>
          </div>
          <div class="mb-4">
            <label class="form-label" for="id_password">Contraseña</label>
            <input type="password" name="password" id="id_password"
              class="form-control btn-touch" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-touch w-100"
            style="background-color:#6f42c1;border-color:#6f42c1;color:white">
            <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
